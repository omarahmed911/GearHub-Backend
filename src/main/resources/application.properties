spring.application.name=GearHub
spring.config.import=optional:file:.env[.properties]

# --- Datasource (use environment or .env) ---
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/gearhub?createDatabaseIfNotExist=true&useSSL=false&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USERNAME:root}
spring.datasource.password=${DB_PASSWORD:}
spring.datasource.hikari.maximum-pool-size=${DB_POOL_SIZE:10}
spring.datasource.hikari.minimum-idle=${DB_POOL_IDLE:2}

# --- Flyway-ready baseline: Hibernate aligns schema while developing; prod should prefer validate+migrations ---
spring.jpa.hibernate.ddl-auto=${JPA_DDL_AUTO:update}
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.globally_quoted_identifiers=false
spring.jpa.open-in-view=true

spring.sql.init.mode=${SQL_INIT_MODE:always}
spring.sql.init.continue-on-error=false

server.error.whitelabel.enabled=false
spring.mvc.throw-exception-if-no-handler-found=true
spring.web.resources.add-mappings=true

management.endpoints.web.base-path=/actuator
management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=never

gearhub.jwt.secret=${GEARHUB_JWT_SECRET:dev-secret-MUST-change-min-32-chars-in-prod-app}
gearhub.jwt.access-token-expiration-ms=${GEARHUB_JWT_EXPIRATION_MS:86400000}

gearhub.cors.allowed-origin-patterns=${GEARHUB_CORS_ORIGINS:http://localhost:*,http://127.0.0.1:*}

# Optional one-time bootstrap admin when no admin CLI exists yet (explicit opt-in).
gearhub.bootstrap.enabled=${GEARHUB_BOOTSTRAP_ADMIN:false}
gearhub.bootstrap.admin-username=${GEARHUB_BOOTSTRAP_ADMIN_USER:Administrator}
gearhub.bootstrap.admin-email=${GEARHUB_BOOTSTRAP_ADMIN_EMAIL:}
gearhub.bootstrap.admin-password=${GEARHUB_BOOTSTRAP_ADMIN_PASSWORD:}

logging.level.root=INFO
logging.level.gearhub=INFO
