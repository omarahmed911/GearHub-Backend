spring.application.name=GearHub

spring.datasource.url=jdbc:h2:mem:gearhub-test;MODE=MySQL;DB_CLOSE_DELAY=-1
spring.datasource.username=sa
spring.datasource.password=
spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.sql.init.mode=never

gearhub.jwt.secret=test-signing-secret-with-at-least-32-characters-used-for-ci
gearhub.jwt.access-token-expiration-ms=3600000
gearhub.cors.allowed-origin-patterns=http://localhost:*

management.endpoints.enabled-by-default=false

gearhub.bootstrap.enabled=false
